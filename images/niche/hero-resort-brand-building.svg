<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Resort and hotel brand building hero illustration — abstract horizon line with arches and gold light, representing hospitality brand storytelling">
  <defs>
    <linearGradient id="resortBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#15110d"/>
    </linearGradient>
    <radialGradient id="resortSun" cx="0.78" cy="0.42" r="0.3">
      <stop offset="0%" stop-color="#c9b785" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9b785" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#resortBg)"/>
  <!-- Sun glow -->
  <circle cx="1248" cy="378" r="280" fill="url(#resortSun)"/>
  <!-- Distant horizon -->
  <line x1="0" y1="540" x2="1600" y2="540" stroke="#c9b785" stroke-width="0.5" opacity="0.35"/>
  <!-- Arched silhouettes of hotel architecture -->
  <g fill="none" stroke="#c9b785" stroke-width="1" opacity="0.45">
    <!-- Three arches -->
    <path d="M 200 540 L 200 460 Q 200 410 250 410 Q 300 410 300 460 L 300 540"/>
    <path d="M 320 540 L 320 460 Q 320 410 370 410 Q 420 410 420 460 L 420 540"/>
    <path d="M 440 540 L 440 460 Q 440 410 490 410 Q 540 410 540 460 L 540 540"/>
    <!-- Tall central tower silhouette -->
    <path d="M 720 540 L 720 320 L 740 300 L 760 320 L 760 540"/>
    <path d="M 740 300 L 740 270" stroke-dasharray="2 3"/>
    <!-- Wider arches on right -->
    <path d="M 880 540 L 880 440 Q 880 380 940 380 Q 1000 380 1000 440 L 1000 540"/>
    <path d="M 1020 540 L 1020 440 Q 1020 380 1080 380 Q 1140 380 1140 440 L 1140 540"/>
  </g>
  <!-- Foreground subtle waves -->
  <path d="M 0 720 Q 400 680 800 720 T 1600 720" fill="none" stroke="#c9b785" stroke-width="0.6" opacity="0.3"/>
  <path d="M 0 770 Q 350 740 700 770 T 1300 770 T 1600 760" fill="none" stroke="#c9b785" stroke-width="0.4" opacity="0.2"/>
</svg>
