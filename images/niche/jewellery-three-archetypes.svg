<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Three archetypes of jewellery brands — heritage gold houses, contemporary silver labels, and direct-to-consumer fine jewellery — illustrated as a comparison framework">
  <rect width="1600" height="900" fill="#0a0a0a"/>
  <text x="800" y="130" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="28" fill="#c9b785">Three archetypes of a jewellery brand</text>

  <!-- Three columns -->
  <g font-family="Times New Roman, serif">
    <!-- Heritage -->
    <g transform="translate(266, 320)">
      <circle r="80" fill="none" stroke="#c9b785" stroke-width="1.5" opacity="0.85"/>
      <text y="6" text-anchor="middle" font-style="italic" font-size="22" fill="#c9b785">Heritage</text>
      <text y="120" text-anchor="middle" font-size="13" letter-spacing="3" fill="#c9b785" opacity="0.65">GOLD HOUSES</text>
      <text y="148" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">Story-led, generational</text>
      <text y="170" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">trust, bridal, family</text>
    </g>
    <!-- Contemporary -->
    <g transform="translate(800, 320)">
      <circle r="80" fill="none" stroke="#c9b785" stroke-width="1.3" opacity="0.75"/>
      <text y="6" text-anchor="middle" font-style="italic" font-size="22" fill="#c9b785">Contemporary</text>
      <text y="120" text-anchor="middle" font-size="13" letter-spacing="3" fill="#c9b785" opacity="0.65">SILVER LABELS</text>
      <text y="148" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">Daily-wear, design-led,</text>
      <text y="170" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">accessible luxury</text>
    </g>
    <!-- D2C -->
    <g transform="translate(1334, 320)">
      <circle r="80" fill="none" stroke="#c9b785" stroke-width="1.1" opacity="0.65"/>
      <text y="6" text-anchor="middle" font-style="italic" font-size="22" fill="#c9b785">Direct-to-consumer</text>
      <text y="120" text-anchor="middle" font-size="13" letter-spacing="3" fill="#c9b785" opacity="0.65">FINE D2C</text>
      <text y="148" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">Made-to-order, lab-grown,</text>
      <text y="170" text-anchor="middle" font-size="12" fill="#c9b785" opacity="0.5">digital-first, custom</text>
    </g>
  </g>

  <!-- Connecting line at bottom -->
  <line x1="266" y1="600" x2="1334" y2="600" stroke="#c9b785" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 4"/>

  <text x="800" y="700" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="16" fill="#c9b785" opacity="0.55">Each archetype calls for a different brand strategy. The work doesn't transfer.</text>
</svg>
