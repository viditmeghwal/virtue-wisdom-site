<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Marble veins flow across a dark ground with gold accent cracks — illustrating brand building for marble companies">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgFade)"/>
  <!-- Stone-like veins -->
  <path d="M 0 180 Q 300 80 600 220 T 1100 160 T 1600 240" fill="none" stroke="#c9b785" stroke-width="1.4" opacity="0.7"/>
  <path d="M 0 240 Q 250 340 500 260 T 1000 320 T 1600 270" fill="none" stroke="#c9b785" stroke-width="0.6" opacity="0.4"/>
  <path d="M 0 420 Q 400 340 800 440 T 1400 400 T 1600 450" fill="none" stroke="#c9b785" stroke-width="1.6" opacity="0.85"/>
  <path d="M 0 500 Q 350 600 700 490 T 1300 540 T 1600 490" fill="none" stroke="#c9b785" stroke-width="0.5" opacity="0.35"/>
  <path d="M 0 700 Q 300 600 600 720 T 1200 680 T 1600 730" fill="none" stroke="#c9b785" stroke-width="1" opacity="0.55"/>
  <path d="M 0 770 Q 400 830 800 770 T 1400 810 T 1600 780" fill="none" stroke="#c9b785" stroke-width="0.4" opacity="0.3"/>
  <!-- Vertical gold cracks -->
  <path d="M 600 0 L 590 220 L 615 380 L 605 520 L 620 700 L 610 900" fill="none" stroke="#c9b785" stroke-width="0.7" opacity="0.6"/>
  <path d="M 1100 0 L 1090 200 L 1105 380 L 1098 540 L 1112 720 L 1102 900" fill="none" stroke="#c9b785" stroke-width="0.5" opacity="0.4"/>
  <!-- Subtle grain dots -->
  <g fill="#c9b785" opacity="0.4">
    <circle cx="200" cy="160" r="1.2"/>
    <circle cx="850" cy="280" r="1.5"/>
    <circle cx="1300" cy="190" r="1"/>
    <circle cx="450" cy="500" r="1.3"/>
    <circle cx="1100" cy="640" r="1.6"/>
    <circle cx="700" cy="780" r="1"/>
  </g>
</svg>
