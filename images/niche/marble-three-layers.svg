<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Three concentric layers showing brand foundation, content marketing layer, and growth distribution layer for marble brand building">
  <rect width="1600" height="900" fill="#0a0a0a"/>
  <!-- Center: foundation -->
  <g transform="translate(800, 450)">
    <!-- Outer ring: distribution -->
    <circle r="380" fill="none" stroke="#c9b785" stroke-width="1" opacity="0.35" stroke-dasharray="4 6"/>
    <text y="-330" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="20" fill="#c9b785" opacity="0.7">distribution</text>
    <!-- Mid ring: content -->
    <circle r="260" fill="none" stroke="#c9b785" stroke-width="1.2" opacity="0.55"/>
    <text y="-210" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="20" fill="#c9b785" opacity="0.85">content</text>
    <!-- Inner ring: brand -->
    <circle r="140" fill="none" stroke="#c9b785" stroke-width="1.5" opacity="0.85"/>
    <text y="-90" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="20" fill="#c9b785">brand</text>
    <!-- Center dot -->
    <circle r="10" fill="#c9b785"/>
    <text y="42" text-anchor="middle" font-family="Times New Roman, serif" font-size="13" fill="#c9b785" opacity="0.5" letter-spacing="3">CORE</text>
  </g>
  <text x="800" y="850" text-anchor="middle" font-family="Times New Roman, serif" font-style="italic" font-size="16" fill="#c9b785" opacity="0.55">The brand-building stack — from inside out</text>
</svg>
